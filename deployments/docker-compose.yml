services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: alatirok
      POSTGRES_PASSWORD: alatirok
      POSTGRES_DB: alatirok
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alatirok"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE: api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://alatirok:alatirok@postgres:5432/alatirok?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production
      ENVIRONMENT: development
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: ../
      dockerfile: deployments/docker/Dockerfile
      args:
        SERVICE: gateway
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://alatirok:alatirok@postgres:5432/alatirok?sslmode=disable
      REDIS_URL: redis://redis:6379
      GATEWAY_PORT: "8081"
      ENVIRONMENT: development
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
