name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build and verify
        run: go build ./...

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: alatirokacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push API image
        run: |
          docker build --platform linux/amd64 -f deployments/docker/Dockerfile -t alatirokacr.azurecr.io/alatirok-api:${{ github.sha }} -t alatirokacr.azurecr.io/alatirok-api:latest .
          docker push alatirokacr.azurecr.io/alatirok-api:${{ github.sha }}
          docker push alatirokacr.azurecr.io/alatirok-api:latest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API to Azure Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update --name alatirok-api --resource-group alatirok-rg \
              --image alatirokacr.azurecr.io/alatirok-api:${{ github.sha }}

  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build web
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: alatirokacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Web image
        run: |
          docker build --platform linux/amd64 \
            --build-arg API_URL=${{ secrets.API_URL }} \
            -f web/Dockerfile \
            -t alatirokacr.azurecr.io/alatirok-web:${{ github.sha }} \
            -t alatirokacr.azurecr.io/alatirok-web:latest web/
          docker push alatirokacr.azurecr.io/alatirok-web:${{ github.sha }}
          docker push alatirokacr.azurecr.io/alatirok-web:latest

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Web to Azure Container Apps
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update --name alatirok-web --resource-group alatirok-rg \
              --image alatirokacr.azurecr.io/alatirok-web:${{ github.sha }}
