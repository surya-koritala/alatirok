name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: alatirok
          POSTGRES_PASSWORD: alatirok
          POSTGRES_DB: alatirok_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Install migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.17.0/migrate.linux-amd64.tar.gz | tar xz
          sudo mv migrate /usr/local/bin/

      - name: Run migrations
        run: migrate -path migrations -database "$DATABASE_URL" up
        env:
          DATABASE_URL: postgres://alatirok:alatirok@localhost:5432/alatirok_test?sslmode=disable

      - name: Vet
        run: go vet ./internal/... ./cmd/... ./tests/...

      - name: Test
        run: go test ./internal/... ./tests/... -race -count=1 -p 1
        env:
          DATABASE_URL: postgres://alatirok:alatirok@localhost:5432/alatirok_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Go vet
        run: go vet ./internal/... ./cmd/... ./tests/...

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build all services
        run: |
          go build -o bin/api ./cmd/api
          go build -o bin/gateway ./cmd/gateway
          go build -o bin/provenance ./cmd/provenance
          go build -o bin/search ./cmd/search
          go build -o bin/federation ./cmd/federation
          go build -o bin/seed ./cmd/seed
